<!DOCTYPE html>
<html dir="ltr" lang="zh" xml:lang="zh">
<head>
    <title>登入本網站 | iLearn</title>
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="all.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        #page-login-index #page {
            background-image: url('assets/login_background.png') !important;
            background-size: cover;
            background-position: center;
        }

        html, body { height: 100%; margin: 0; }
        #page-wrapper { min-height: 100vh; display: flex; flex-direction: column; }
        #page { flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
        #page-content { flex: 1; display: flex; min-height: 100vh; }
        #region-main-box { display: flex; flex: 1; }
        #region-main { display: flex; flex: 1; align-items: center; justify-content: center; }
        .login-wrapper { width: 100%; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        #page-login-index .loginform.hastwocolumns {
            margin-left: auto !important;
            margin-right: auto !important;
        }

        .dropdown-menu { display: none; }
        .dropdown-menu.show { display: block; }

        .cookie-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.55);
            color: #fff;
            padding: 0.6rem 2rem;
            font-size: 0.8rem;
            z-index: 9999;
            text-align: center;
        }
        .cookie-bar a { color: #f0c040; text-decoration: underline; }
        .cookie-bar .btn-continue {
            background: none;
            border: none;
            color: #f0c040;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: underline;
            padding: 0;
            margin-left: 0.5rem;
        }
        .cookie-bar .btn-continue:hover { color: #fff; }
    </style>
</head>
<body id="page-login-index" class="format-site path-login chrome dir-ltr lang-zh_tw yui-skin-sam yui3-skin-sam ilearn-fcu-edu-tw pagelayout-login course-1 context-1 notloggedin moove-login jsenabled">

<div class="toast-wrapper mx-auto py-0 fixed-top" role="status" aria-live="polite"></div>

<div id="page-wrapper">
    <div id="page" class="container-fluid mt-0">
        <div id="page-content" class="row m-0">
            <div id="region-main-box" class="col-12 p-0">
                <section id="region-main" class="col-12 h-100 p-0" aria-label="內容">
                    <div class="login-wrapper">
                        <div class="login-container">
                            <div role="main">
                                <span id="maincontent"></span>
                                <div class="loginform row hastwocolumns">

                                    <div class="col-lg-6 col-md-12 left-column">
                                        <div id="loginlogo" class="login-logo">
                                            <img id="logoimage"
                                                src="assets/moodle4_log.jpg"
                                                class="img-fluid"
                                                alt="iLearn" />
                                            <h1 class="login-heading sr-only">登入到iLearn</h1>
                                        </div>

                                        <form class="login-form" action="#" method="post" id="login">
                                            <input type="hidden" name="logintoken" value="">
                                            <div class="login-form-username form-group">
                                                <label for="username" class="sr-only">帳號</label>
                                                <input type="text"
                                                    name="username"
                                                    id="username"
                                                    class="form-control form-control-lg"
                                                    value=""
                                                    placeholder="帳號"
                                                    autocomplete="username">
                                            </div>
                                            <div class="login-form-password form-group">
                                                <label for="password" class="sr-only">密碼</label>
                                                <input type="password"
                                                    name="password"
                                                    id="password"
                                                    value=""
                                                    class="form-control form-control-lg"
                                                    placeholder="密碼"
                                                    autocomplete="current-password">
                                            </div>
                                            <div class="login-form-submit form-group">
                                                <button class="btn btn-primary btn-block btn-lg" type="submit" id="loginbtn">登入</button>
                                            </div>
                                        </form>
                                    </div>

                                    <div class="col-lg-6 col-md-12 right-column">
                                        <div class="column-content">
                                            <p style="text-align:center;">
                                                <strong style="font-size:large;">請使用NID帳號/密碼登入平台。</strong>
                                            </p>
                                            <p style="text-align:center;">
                                                <strong style="font-size:large;">欲變更NID密碼，請連結至
                                                    <a href="https://netid.fcu.edu.tw/" target="_blank" rel="noreferrer noopener">NID</a>
                                                </strong>
                                            </p>

                                            <div class="d-flex mt-2">
                                                <div class="login-languagemenu">
                                                    <div class="action-menu moodle-actionmenu">
                                                        <div class="menubar d-flex">
                                                            <div class="action-menu-trigger">
                                                                <div class="dropdown">
                                                                    <a href="#"
                                                                        tabindex="0"
                                                                        class="dropdown-toggle icon-no-margin"
                                                                        id="lang-toggle-login"
                                                                        aria-label="正體中文 ‎(zh_tw)‎"
                                                                        data-toggle="dropdown"
                                                                        role="button"
                                                                        aria-haspopup="true"
                                                                        aria-expanded="false">
                                                                        正體中文 ‎(zh_tw)‎
                                                                        <b class="caret"></b>
                                                                    </a>
                                                                    <div class="dropdown-menu menu dropdown-menu-right" aria-labelledby="lang-toggle-login" role="menu">
                                                                        <a href="#" class="dropdown-item menu-action" role="menuitem">正體中文 ‎(zh_tw)‎</a>
                                                                        <a href="#" class="dropdown-item menu-action" role="menuitem">English ‎(en)‎</a>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <button type="button" class="ml-auto btn btn-link" id="cookieInfoBtn">
                                                    <i class="fa fa-question-circle"></i> Cookie使用資訊
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</div>

<div class="cookie-bar" id="cookieBar">
    If you continue browsing this website, you agree to our policies:<br>
    <a href="#">尊重及保護智慧財產權</a><br>
    <button class="btn-continue" onclick="document.getElementById('cookieBar').style.display='none'">Continue</button>
</div>

<div class="modal fade" id="cookieModal" tabindex="-1" role="dialog" aria-labelledby="cookieModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="cookieModalLabel">Cookie使用資訊</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <p>本網站使用 Cookie 以改善您的瀏覽體驗。繼續使用本網站即表示您同意我們的 Cookie 使用政策。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">關閉</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('cookieInfoBtn').addEventListener('click', function() {
        $('#cookieModal').modal('show');
    });
</script>
</body>
</html>
